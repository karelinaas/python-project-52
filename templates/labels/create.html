{% extends "base.html" %}
{% load i18n %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <h1>{% trans "Create label" %}</h1>
        
        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    {% trans "Create" %}
                </button>
                <a href="{% url 'labels:list' %}" class="btn btn-secondary">
                    {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
