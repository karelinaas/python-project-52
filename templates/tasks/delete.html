{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>{% trans "Delete task" %}</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <p class="mb-3">
                    {% trans "Are you sure you want to delete task" %} 
                    <strong>{{ task.name }}?</strong>?
                </p>
                <p class="text-muted small">
                    {% trans "This action cannot be canceled." %}
                </p>

                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'tasks:list' %}" class="btn btn-secondary">
                            {% trans "Cancel" %}
                        </a>
                        <button type="submit" class="btn btn-danger">
                            {% trans "Yes, delete" %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
