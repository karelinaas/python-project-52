{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{% trans "Delete User" %}</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">
                    {% trans "Are you sure you want to delete user " %}
                    "{{ object.username }}"?
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            {% trans "Yes, delete" %}
                        </button>
                        <a href="{% url 'users:list' %}" class="btn btn-secondary">
                            {% trans "Cancel" %}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
